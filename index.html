<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shopping List — Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">
  <h1>🛒 Shopping List</h1>

  
  <div class="tabs">
    <div class="tab active" onclick="showTab('login')">Login</div>
    <div class="tab" onclick="showTab('register')">Register</div>
  </div>

 
  <div class="card" id="loginForm">
    <h2>Welcome back!</h2>
    <p id="loginError" class="error"></p>
    <label>Email</label>
    <input type="email" id="loginEmail" placeholder="your@email.com" />
    <label>Password</label>
    <input type="password" id="loginPassword" placeholder="••••••••" />
    <button onclick="login()">Login</button>
  </div>

  
  <div class="card" id="registerForm" style="display:none">
    <h2>Create account</h2>
    <p id="registerError" class="error"></p>
    <p id="registerSuccess" class="success"></p>
    <label>Username</label>
    <input type="text" id="regUsername" placeholder="harnoor" />
    <label>Email</label>
    <input type="email" id="regEmail" placeholder="your@email.com" />
    <label>Password</label>
    <input type="password" id="regPassword" placeholder="••••••••" />
    <button onclick="register()">Register</button>
  </div>
</div>

<script>
  const API = 'http://localhost:3000/api';

  function showTab(tab) {
    document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
    });
  }

  async function login() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;

    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (res.ok) {
      localStorage.setItem('token', data.token);
      localStorage.setItem('username', data.username);
      window.location.href = 'lists.html';
    } else {
      document.getElementById('loginError').textContent = data.message;
    }
  }

  async function register() {
    const username = document.getElementById('regUsername').value;
    const email = document.getElementById('regEmail').value;
    const password = document.getElementById('regPassword').value;

    const res = await fetch(`${API}/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password })
    });

    const data = await res.json();

    if (res.ok) {
      document.getElementById('registerSuccess').textContent = 'Account created! Please login.';
      document.getElementById('registerError').textContent = '';
      showTab('login');
    } else {
      document.getElementById('registerError').textContent = data.message;
    }
  }
</script>

</body>
</html>
