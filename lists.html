<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Lists</title>
 <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Navbar -->
<div class="nav">
  <h2>🛒 Shopping List</h2>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">
  <h1>My Lists</h1>

  <!-- Create new list -->
  <div class="card">
    <h2>Create a new list</h2>
    <p id="listError" class="error"></p>
    <label>List name</label>
    <input type="text" id="listName" placeholder="e.g. Weekly Shop" />
    <button onclick="createList()">Create List</button>
  </div>

  <!-- All lists -->
  <div class="card">
    <h2>Your lists</h2>
    <div id="listsContainer">Loading...</div>
  </div>
</div>

<script>
  const API = 'http://localhost:3000/api';
  const token = localStorage.getItem('token');

  // Redirect to login if not logged in
  if (!token) window.location.href = 'index.html';

  // Load lists when page opens
  loadLists();

  async function loadLists() {
    const res = await fetch(`${API}/lists`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });

    const lists = await res.json();
    const container = document.getElementById('listsContainer');

    if (lists.length === 0) {
      container.innerHTML = '<p style="color:#888">No lists yet. Create one above!</p>';
      return;
    }

    container.innerHTML = lists.map(list => `
      <div class="list-item">
        <div class="item-info">
          <span class="item-name">${list.name}</span>
          <span class="item-meta">Created ${new Date(list.createdAt).toLocaleDateString()}</span>
        </div>
        <div>
          <button class="btn-small" onclick="openList('${list._id}', '${list.name}')">Open</button>
          <button class="btn-danger" onclick="deleteList('${list._id}')">Delete</button>
        </div>
      </div>
    `).join('');
  }

  async function createList() {
    const name = document.getElementById('listName').value;
    if (!name) {
      document.getElementById('listError').textContent = 'Please enter a list name';
      return;
    }

    const res = await fetch(`${API}/lists`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({ name })
    });

    if (res.ok) {
      document.getElementById('listName').value = '';
      document.getElementById('listError').textContent = '';
      loadLists();
    }
  }

  async function deleteList(id) {
    if (!confirm('Are you sure you want to delete this list?')) return;

    await fetch(`${API}/lists/${id}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${token}` }
    });

    loadLists();
  }

  function openList(id, name) {
    localStorage.setItem('currentListId', id);
    localStorage.setItem('currentListName', name);
    window.location.href = 'shopping.html';
  }

  function logout() {
    localStorage.clear();
    window.location.href = 'index.html';
  }
</script>

</body>
</html>
