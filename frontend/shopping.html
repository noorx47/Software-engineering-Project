<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shopping List</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { overflow-x: hidden; }
    .page-layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 24px;
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 24px;
    }
    .left-panel { display: flex; flex-direction: column; gap: 20px; }
    .right-panel { display: flex; flex-direction: column; gap: 20px; }
    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
      margin-top: 8px;
    }
    .item-card {
      background: white;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
    }
    .item-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    .item-card.bought-card { opacity: 0.6; }
    .item-card img {
      width: 100%;
      height: 130px;
      object-fit: contain;
      background: #f9f9f9;
      padding: 10px;
    }
    .item-card-body { padding: 10px 12px 12px; }
    .item-card-name {
      font-size: 15px;
      font-weight: 600;
      color: #222;
      margin-bottom: 4px;
    }
    .item-card-name.bought { text-decoration: line-through; color: #aaa; }
    .item-card-meta { font-size: 12px; color: #999; margin-bottom: 10px; }
    .item-card-actions { display: flex; gap: 6px; }
    .item-card-actions button {
      flex: 1;
      padding: 7px 4px;
      font-size: 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .item-card-actions button:hover { opacity: 0.85; }
    .btn-done { background: #E8F5E9; color: #1B5E20; }
    .btn-del { background: #FFEBEE; color: #c62828; }
    .bought-ribbon {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #1B5E20;
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
    }
    .spinner { text-align: center; padding: 40px; color: #aaa; font-size: 15px; }
    @media (max-width: 768px) {
      .page-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="nav">
  <button class="nav-btn" onclick="window.location.href='lists.html'">← Back</button>
  <span style="font-size:18px; font-weight:700;" id="listTitle">Shopping List</span>
  <button class="nav-btn" onclick="logout()">Logout</button>
</div>

<div class="page-layout">
  <div class="left-panel">
    <div class="card">
      <h2>📊 Progress</h2>
      <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
        <span style="font-size:13px; color:#555;">Items bought</span>
        <span style="font-size:13px; font-weight:700; color:#1B5E20;" id="progressText">0/0</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <p id="progressMsg" style="font-size:13px; color:#888; margin-top:8px; text-align:center;"></p>
    </div>

    <div class="card">
      <h2>➕ Add Item</h2>
      <p id="itemError" class="error"></p>
      <label>Item name</label>
      <input type="text" id="itemName" placeholder="e.g. Milk, Bread..."
        oninput="searchProduct(this.value)" />
      <div id="suggestions" style="display:none; margin-bottom:12px;">
        <p style="font-size:12px; color:#888; margin-bottom:6px;">Suggestions:</p>
        <div id="suggestionsList" style="display:flex; flex-wrap:wrap; gap:6px;"></div>
      </div>
      <label>Quantity</label>
      <input type="text" id="itemQuantity" placeholder="e.g. 2 litres, 1 pack" />
      <label>Category</label>
      <select id="itemCategory">
        <option value="Food">🥦 Food</option>
        <option value="Toiletries">🧴 Toiletries</option>
        <option value="Other">📦 Other</option>
      </select>
      <button class="btn-primary" onclick="addItem()">Add to List</button>
    </div>

    <div class="card">
      <h2>👥 Invite Flatmate</h2>
      <p style="font-size:13px; color:#888; margin-bottom:12px;">
        Add a flatmate by their username so they can see and edit this list.
      </p>
      <p id="inviteError" class="error"></p>
      <p id="inviteSuccess" class="success"></p>
      <label>Username</label>
      <input type="text" id="inviteUsername" placeholder="e.g. sarah123" />
      <button class="btn-primary" onclick="inviteFlatmate()">Send Invite</button>
    </div>
  </div>

  <div class="right-panel">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <h2 style="margin:0;">🛒 Your Items</h2>
        <span id="itemCount" style="font-size:13px; color:#888;"></span>
      </div>
      <div id="itemsContainer">
        <div class="spinner">⏳ Loading items...</div>
      </div>
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:3000/api';
  const token = localStorage.getItem('token');
  const listId = localStorage.getItem('currentListId');
  const listName = localStorage.getItem('currentListName');
  const imageCache = {};

  if (!token || !listId) window.location.href = 'index.html';

  document.getElementById('listTitle').textContent = '🛒 ' + listName;

  loadItems();
  setInterval(loadItems, 5000);

  async function getProductImage(name) {
    if (imageCache[name]) return imageCache[name];
    try {
      const res = await fetch(
        `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(name)}&search_simple=1&action=process&json=1&page_size=1`
      );
      const data = await res.json();
      if (data.products && data.products.length > 0 && data.products[0].image_front_small_url) {
        imageCache[name] = data.products[0].image_front_small_url;
        return imageCache[name];
      }
    } catch (e) {}
    return null;
  }

  function getEmoji(category, name) {
    const n = name.toLowerCase();
    if (n.includes('milk')) return '🥛';
    if (n.includes('bread')) return '🍞';
    if (n.includes('egg')) return '🥚';
    if (n.includes('apple')) return '🍎';
    if (n.includes('banana')) return '🍌';
    if (n.includes('water')) return '💧';
    if (n.includes('juice')) return '🧃';
    if (n.includes('cheese')) return '🧀';
    if (n.includes('butter')) return '🧈';
    if (n.includes('coffee')) return '☕';
    if (n.includes('tea')) return '🍵';
    if (n.includes('rice')) return '🍚';
    if (n.includes('pasta')) return '🍝';
    if (n.includes('chicken')) return '🍗';
    if (n.includes('beef') || n.includes('meat')) return '🥩';
    if (n.includes('fish')) return '🐟';
    if (n.includes('tomato')) return '🍅';
    if (n.includes('potato')) return '🥔';
    if (n.includes('onion')) return '🧅';
    if (n.includes('shampoo') || n.includes('soap')) return '🧴';
    if (n.includes('toothpaste') || n.includes('tooth')) return '🪥';
    if (category === 'Toiletries') return '🧴';
    return '🛒';
  }

  async function loadItems() {
    const res = await fetch(`${API}/items/${listId}`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const items = await res.json();
    const container = document.getElementById('itemsContainer');

    if (!Array.isArray(items) || items.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <span class="empty-state-emoji">🛒</span>
          <p class="empty-state-text">No items yet. Add your first item!</p>
        </div>`;
      document.getElementById('progressText').textContent = '0/0';
      document.getElementById('progressFill').style.width = '0%';
      document.getElementById('itemCount').textContent = '';
      document.getElementById('progressMsg').textContent = 'Start adding items!';
      return;
    }

    const bought = items.filter(i => i.bought).length;
    const total = items.length;
    const percent = Math.round((bought / total) * 100);
    document.getElementById('progressText').textContent = `${bought}/${total}`;
    document.getElementById('progressFill').style.width = `${percent}%`;
    document.getElementById('itemCount').textContent = `${total} item${total !== 1 ? 's' : ''}`;
    document.getElementById('progressMsg').textContent = percent === 100
      ? '🎉 All done! Great shopping!'
      : `${total - bought} item${total - bought !== 1 ? 's' : ''} left to buy`;

    container.innerHTML = '<div class="items-grid" id="itemsGrid"></div>';
    const grid = document.getElementById('itemsGrid');

    for (const item of items) {
      const card = document.createElement('div');
      card.className = `item-card ${item.bought ? 'bought-card' : ''}`;
      card.id = `item-${item._id}`;

      const emoji = getEmoji(item.category, item.name);
      const catClass = { Food: 'cat-food', Toiletries: 'cat-toiletries', Other: 'cat-other' };

      card.innerHTML = `
        <div style="width:100%; height:130px; background:#f9f9f9; display:flex; align-items:center; justify-content:center; font-size:52px;">
          ${emoji}
        </div>
        <div class="item-card-body">
          <div class="item-card-name ${item.bought ? 'bought' : ''}">${item.name}</div>
          <div class="item-card-meta">
            📦 ${item.quantity} · <span class="badge ${catClass[item.category] || ''}">${item.category}</span><br/>
            👤 ${item.addedBy?.username || 'someone'}
          </div>
          <div class="item-card-actions">
            <button class="btn-done" onclick="toggleBought('${item._id}')">
              ${item.bought ? '↩ Undo' : '✅ Done'}
            </button>
            <button class="btn-del" onclick="deleteItem('${item._id}')">🗑️</button>
          </div>
        </div>
        ${item.bought ? '<div class="bought-ribbon">✓ Bought</div>' : ''}
      `;

      grid.appendChild(card);

      if (item.category === 'Food') {
        getProductImage(item.name).then(imgUrl => {
          if (imgUrl) {
            const placeholder = card.querySelector('div[style*="font-size:52px"]');
            if (placeholder) {
              placeholder.outerHTML = `<img src="${imgUrl}" alt="${item.name}" onerror="this.style.display='none'" />`;
            }
          }
        });
      }
    }
  }

  let searchTimeout;
  async function searchProduct(query) {
    clearTimeout(searchTimeout);
    if (query.length < 2) {
      document.getElementById('suggestions').style.display = 'none';
      return;
    }
    searchTimeout = setTimeout(async () => {
      try {
        const res = await fetch(
          `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&page_size=5`
        );
        const data = await res.json();
        if (data.products && data.products.length > 0) {
          const names = [...new Set(data.products
            .map(p => p.product_name)
            .filter(n => n && n.length > 0)
            .slice(0, 5)
          )];
          if (names.length > 0) {
            document.getElementById('suggestions').style.display = 'block';
            document.getElementById('suggestionsList').innerHTML = names.map(name => `
              <span onclick="selectSuggestion('${name.replace(/'/g, '')}')"
                style="background:#E8F5E9; color:#1B5E20; padding:4px 10px; border-radius:20px; font-size:12px; cursor:pointer; border:1px solid #A5D6A7;">
                ${name}
              </span>
            `).join('');
          }
        }
      } catch (e) {}
    }, 400);
  }

  function selectSuggestion(name) {
    document.getElementById('itemName').value = name;
    document.getElementById('suggestions').style.display = 'none';
  }

  async function addItem() {
    const name = document.getElementById('itemName').value.trim();
    const quantity = document.getElementById('itemQuantity').value.trim() || '1';
    const category = document.getElementById('itemCategory').value;

    if (!name) {
      document.getElementById('itemError').textContent = 'Please enter an item name';
      return;
    }

    const res = await fetch(`${API}/items`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({ name, quantity, category, listId })
    });

    if (res.ok) {
      document.getElementById('itemName').value = '';
      document.getElementById('itemQuantity').value = '';
      document.getElementById('itemError').textContent = '';
      document.getElementById('suggestions').style.display = 'none';
      loadItems();
    }
  }

  async function toggleBought(id) {
    await fetch(`${API}/items/${id}/bought`, {
      method: 'PATCH',
      headers: { 'Authorization': `Bearer ${token}` }
    });
    loadItems();
  }

  function deleteItem(id) {
    const card = document.getElementById(`item-${id}`);
    card.innerHTML = `
      <div style="padding:16px; text-align:center;">
        <p style="font-size:14px; color:#c62828; font-weight:600; margin-bottom:12px;">⚠️ Delete this item?</p>
        <div style="display:flex; gap:8px; justify-content:center;">
          <button onclick="confirmDeleteItem('${id}')"
            style="padding:8px 16px; border:none; border-radius:8px; cursor:pointer; background:#FFEBEE; color:#c62828; font-weight:600;">
            Yes, delete
          </button>
          <button onclick="loadItems()"
            style="padding:8px 16px; border:none; border-radius:8px; cursor:pointer; background:#E8F5E9; color:#1B5E20; font-weight:600;">
            Cancel
          </button>
        </div>
      </div>
    `;
  }

  async function confirmDeleteItem(id) {
    await fetch(`${API}/items/${id}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${token}` }
    });
    loadItems();
  }

  async function inviteFlatmate() {
    const username = document.getElementById('inviteUsername').value.trim();
    if (!username) {
      document.getElementById('inviteError').textContent = 'Please enter a username';
      return;
    }
    const res = await fetch(`${API}/lists/${listId}/invite`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({ username })
    });
    const data = await res.json();
    if (res.ok) {
      document.getElementById('inviteSuccess').textContent = '✅ Flatmate added!';
      document.getElementById('inviteError').textContent = '';
      document.getElementById('inviteUsername').value = '';
    } else {
      document.getElementById('inviteError').textContent = data.message;
      document.getElementById('inviteSuccess').textContent = '';
    }
  }

  function logout() {
    localStorage.clear();
    window.location.href = 'index.html';
  }
</script>

</body>
</html>
