<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Lists</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Navbar -->
<div class="nav">
  <span style="font-size:18px; font-weight:700;">🛒 ShopList</span>
  <div style="display:flex; align-items:center; gap:12px;">
    <span style="font-size:14px; opacity:0.8;">👤 <span id="navUsername"></span></span>
    <button class="nav-btn" onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">

  <!-- Hero -->
  <div class="hero">
    <span class="hero-emoji">🛒</span>
    <div class="hero-title">Your Shopping Lists</div>
    <div class="hero-sub">Stay in sync with your flatmates</div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-number" id="totalLists">0</div>
      <div class="stat-label">Total Lists</div>
    </div>
    <div class="stat-card">
      <div class="stat-number">👥</div>
      <div class="stat-label">Shared</div>
    </div>
    <div class="stat-card">
      <div class="stat-number">✅</div>
      <div class="stat-label">Active</div>
    </div>
  </div>

  <!-- Create new list -->
  <div class="card">
    <h2>➕ New List</h2>
    <p id="listError" class="error"></p>
    <div class="input-row">
      <input type="text" id="listName" placeholder="e.g. Weekly Shop, Party Supplies..." />
      <button class="btn-primary" onclick="createList()">Create</button>
    </div>
  </div>

  <!-- All lists -->
  <div class="card">
    <h2>📋 Your Lists</h2>
    <div id="listsContainer">
      <div class="empty-state">
        <span class="empty-state-emoji">📝</span>
        <p class="empty-state-text">Loading your lists...</p>
      </div>
    </div>
  </div>

</div>

<script>
  const API = 'http://localhost:3000/api';
  const token = localStorage.getItem('token');
  const username = localStorage.getItem('username');

  if (!token) window.location.href = 'index.html';

  document.getElementById('navUsername').textContent = username;

  loadLists();

  async function loadLists() {
    const res = await fetch(`${API}/lists`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });

    const lists = await res.json();
    const container = document.getElementById('listsContainer');

    if (!Array.isArray(lists) || lists.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <span class="empty-state-emoji">🛒</span>
          <p class="empty-state-text">No lists yet. Create your first one above!</p>
        </div>`;
      document.getElementById('totalLists').textContent = '0';
      return;
    }

    document.getElementById('totalLists').textContent = lists.length;

    container.innerHTML = lists.map(list => `
  <div class="list-card" id="list-${list._id}">
        <div>
          <div class="list-card-name">📋 ${list.name}</div>
          <div class="list-card-date">📅 ${new Date(list.createdAt).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' })}</div>
        </div>
        <div class="btn-group">
          <button class="btn-secondary" onclick="openList('${list._id}', '${list.name}')">Open →</button>
          <button class="btn-danger" onclick="deleteList('${list._id}')">🗑️</button>
        </div>
      </div>
    `).join('');
  }

  async function createList() {
    const name = document.getElementById('listName').value.trim();
    if (!name) {
      document.getElementById('listError').textContent = 'Please enter a list name';
      return;
    }

    const res = await fetch(`${API}/lists`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({ name })
    });

    if (res.ok) {
      document.getElementById('listName').value = '';
      document.getElementById('listError').textContent = '';
      loadLists();
    }
  }

function deleteList(id) {
  // Show inline confirmation instead of browser popup
  const card = document.getElementById(`list-${id}`);
  card.innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:center; padding: 4px 0;">
      <span style="font-size:14px; color:#c62828; font-weight:600;">⚠️ Delete this list?</span>
      <div class="btn-group">
        <button class="btn-danger" onclick="confirmDelete('${id}')">Yes, delete</button>
        <button class="btn-secondary" onclick="loadLists()">Cancel</button>
      </div>
    </div>
  `;
}

async function confirmDelete(id) {
  await fetch(`${API}/lists/${id}`, {
    method: 'DELETE',
    headers: { 'Authorization': `Bearer ${token}` }
  });
  loadLists();
}
  function openList(id, name) {
    localStorage.setItem('currentListId', id);
    localStorage.setItem('currentListName', name);
    window.location.href = 'shopping.html';
  }

  function logout() {
    localStorage.clear();
    window.location.href = 'index.html';
  }
</script>

</body>
</html>
