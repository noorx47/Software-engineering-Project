<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FlatCart — My Lists</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0e1a;
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(30,80,200,0.3) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(100,20,200,0.2) 0%, transparent 50%),
                  radial-gradient(ellipse at 60% 80%, rgba(0,150,255,0.2) 0%, transparent 50%);
    }

    .particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(100,180,255,0.5);
      border-radius: 50%;
      animation: floatParticle linear infinite;
    }

    .particle:nth-child(1)  { left: 10%; animation-duration: 15s; animation-delay: 0s; }
    .particle:nth-child(2)  { left: 25%; animation-duration: 12s; animation-delay: 2s; width: 4px; height: 4px; }
    .particle:nth-child(3)  { left: 40%; animation-duration: 18s; animation-delay: 1s; }
    .particle:nth-child(4)  { left: 55%; animation-duration: 14s; animation-delay: 3s; width: 5px; height: 5px; }
    .particle:nth-child(5)  { left: 70%; animation-duration: 16s; animation-delay: 0.5s; }
    .particle:nth-child(6)  { left: 85%; animation-duration: 11s; animation-delay: 2.5s; }
    .particle:nth-child(7)  { left: 92%; animation-duration: 19s; animation-delay: 1.5s; }
    .particle:nth-child(8)  { left: 5%;  animation-duration: 13s; animation-delay: 4s; }

    @keyframes floatParticle {
      0%   { transform: translateY(110vh); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }

    .nav {
      position: relative;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 48px;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .nav-logo {
      font-size: 24px;
      font-weight: 800;
      color: white;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-logo-icon {
      font-size: 28px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .nav-user {
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      background: rgba(255,255,255,0.06);
      padding: 8px 16px;
      border-radius: 25px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .nav-btn {
      background: rgba(255,255,255,0.07);
      color: white;
      border: 1px solid rgba(255,255,255,0.15);
      padding: 9px 22px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .nav-btn:hover {
      background: rgba(255,255,255,0.12);
      transform: translateY(-1px);
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: calc(100vh - 74px);
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .hero-side {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 70px 60px;
      color: white;
      animation: fadeInLeft 0.7s ease;
    }

    @keyframes fadeInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, rgba(255,200,50,0.15), rgba(255,150,0,0.1));
      border: 1px solid rgba(255,200,50,0.3);
      color: #ffd166;
      font-size: 12px;
      font-weight: 700;
      padding: 7px 16px;
      border-radius: 25px;
      margin-bottom: 28px;
      width: fit-content;
    }

    .hero-title {
      font-size: 58px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #ffffff, #a8d8ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-title span {
      background: linear-gradient(135deg, #ffd166, #ff9f43);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: 17px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 48px;
      line-height: 1.8;
    }

    .stats-row {
      display: flex;
      gap: 16px;
    }

    .stat-box {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 18px 20px;
      text-align: center;
      flex: 1;
      transition: all 0.3s;
    }

    .stat-box:hover {
      transform: translateY(-4px);
      border-color: rgba(100,180,255,0.3);
    }

    .stat-number {
      font-size: 30px;
      font-weight: 800;
      background: linear-gradient(135deg, #ffd166, #ff9f43);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
    }

    .panel-side {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px 48px;
      gap: 20px;
      overflow-y: auto;
      max-height: calc(100vh - 74px);
      animation: fadeInRight 0.7s ease;
    }

    @keyframes fadeInRight {
      from { opacity: 0; transform: translateX(30px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .glass-card {
      background: linear-gradient(135deg, rgba(255,255,255,0.07), rgba(255,255,255,0.03));
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      transition: all 0.3s;
    }

    .glass-card:hover {
      border-color: rgba(247,183,49,0.2);
    }

    .glass-card h2 {
      color: white;
      font-size: 17px;
      margin-bottom: 18px;
      font-weight: 700;
    }

    .glass-input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: white;
      font-size: 15px;
      outline: none;
      transition: all 0.2s;
      margin-bottom: 14px;
    }

    .glass-input::placeholder { color: rgba(255,255,255,0.3); }

    .glass-input:focus {
      border-color: #ffd166;
      background: rgba(255,255,255,0.1);
      box-shadow: 0 0 0 3px rgba(255,209,102,0.1);
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #f7b731, #ff9f43);
      color: #0a0e1a;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(247,183,49,0.35);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(247,183,49,0.5);
    }

    .list-item-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .list-item-row:last-child { border-bottom: none; }

    .list-name {
      font-size: 15px;
      font-weight: 600;
      color: white;
    }

    .list-date {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      margin-top: 3px;
    }

    .btn-open {
      padding: 8px 18px;
      background: rgba(247,183,49,0.15);
      color: #ffd166;
      border: 1px solid rgba(247,183,49,0.3);
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      transition: all 0.2s;
      margin-left: 8px;
    }

    .btn-open:hover {
      background: rgba(247,183,49,0.25);
      transform: translateY(-1px);
    }

    .btn-remove {
      padding: 8px 12px;
      background: rgba(255,80,80,0.1);
      color: #ff6b6b;
      border: 1px solid rgba(255,80,80,0.25);
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
      margin-left: 6px;
    }

    .btn-remove:hover {
      background: rgba(255,80,80,0.2);
      transform: translateY(-1px);
    }

    .error-msg {
      color: #ff6b6b;
      font-size: 13px;
      margin-bottom: 8px;
      min-height: 18px;
    }

    .empty-msg {
      text-align: center;
      color: rgba(255,255,255,0.35);
      padding: 24px 0;
      font-size: 14px;
    }

    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: rgba(10,14,26,0.95);
      color: white;
      padding: 14px 22px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      z-index: 999;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.35s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-left: 4px solid #ffd166; }
    .toast.error   { border-left: 4px solid #ff6b6b; }

    @media (max-width: 900px) {
      .page { grid-template-columns: 1fr; }
      .hero-side { display: none; }
      .panel-side { max-height: none; padding: 20px; }
    }
  </style>
</head>
<body>

<div class="bg"></div>

<div class="particles">
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
</div>

<div class="toast" id="toast"></div>

<div class="nav">
  <div class="nav-logo">
    <span class="nav-logo-icon">🛒</span>
    FlatCart
  </div>
  <div class="nav-right">
    <span class="nav-user">👤 <span id="navUsername"></span></span>
    <button class="nav-btn" onclick="logout()">Logout</button>
  </div>
</div>

<div class="page">

  <div class="hero-side">
    <div class="hero-badge">✨ Shared Shopping Made Easy</div>
    <h1 class="hero-title">Your <span>Shopping</span><br/>Lists</h1>
    <p class="hero-sub">Stay in sync with your flatmates.<br/>Add items, tick them off, share instantly.</p>
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-number" id="totalLists">0</div>
        <div class="stat-label">Total Lists</div>
      </div>
      <div class="stat-box">
        <div class="stat-number">👥</div>
        <div class="stat-label">Shared</div>
      </div>
      <div class="stat-box">
        <div class="stat-number">✅</div>
        <div class="stat-label">Active</div>
      </div>
    </div>
  </div>

  <div class="panel-side">
    <div class="glass-card">
      <h2>➕ Create New List</h2>
      <p class="error-msg" id="listError"></p>
      <input class="glass-input" type="text" id="listName" placeholder="e.g. Weekly Shop, Party Supplies..." />
      <button class="btn-primary" onclick="createList()">Create List →</button>
    </div>

    <div class="glass-card">
      <h2>📋 Your Lists</h2>
      <div id="listsContainer">
        <p class="empty-msg">Loading your lists...</p>
      </div>
    </div>
  </div>

</div>

<script>
  var API = 'http://localhost:3000/api';

  // Get token and username from browser storage
  var token = localStorage.getItem('token');
  var username = localStorage.getItem('username');

  // If no token found, send user back to login page
  if (!token) {
    window.location.href = 'index.html';
  } else {
    // Token exists so show username and load lists
    document.getElementById('navUsername').textContent = username;
    loadLists();
  }

  // Show toast notification at bottom of screen
  function showToast(message, type) {
    var toast = document.getElementById('toast');
    if (type === 'success') {
      toast.textContent = '✅ ' + message;
    } else {
      toast.textContent = '❌ ' + message;
    }
    toast.className = 'toast ' + type + ' show';
    setTimeout(function() {
      toast.className = 'toast';
    }, 3000);
  }

  // Load all lists from the backend
  async function loadLists() {
    var response = await fetch(API + '/lists', {
      headers: { 'Authorization': 'Bearer ' + token }
    });

    var lists = await response.json();
    var container = document.getElementById('listsContainer');

    // If no lists found show empty message
    if (!Array.isArray(lists) || lists.length === 0) {
      container.innerHTML = '<p class="empty-msg">🛒 No lists yet. Create your first one!</p>';
      document.getElementById('totalLists').textContent = '0';
      return;
    }

    // Update the total lists count
    document.getElementById('totalLists').textContent = lists.length;

    // Build the HTML for each list
    var html = '';
    for (var i = 0; i < lists.length; i++) {
      var list = lists[i];
      var date = new Date(list.createdAt).toLocaleDateString('en-GB', {
        day: 'numeric',
        month: 'short',
        year: 'numeric'
      });
      html += '<div class="list-item-row" id="list-' + list._id + '">';
      html += '<div>';
      html += '<div class="list-name">📋 ' + list.name + '</div>';
      html += '<div class="list-date">📅 ' + date + '</div>';
      html += '</div>';
      html += '<div style="display:flex; align-items:center;">';
      html += '<button class="btn-open" onclick="openList(\'' + list._id + '\', \'' + list.name + '\')">Open →</button>';
      html += '<button class="btn-remove" onclick="deleteList(\'' + list._id + '\')">🗑️</button>';
      html += '</div>';
      html += '</div>';
    }
    container.innerHTML = html;
  }

  // Create a new list
  async function createList() {
    var name = document.getElementById('listName').value.trim();

    if (!name) {
      document.getElementById('listError').textContent = 'Please enter a list name';
      return;
    }

    var response = await fetch(API + '/lists', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({ name: name })
    });

    if (response.ok) {
      document.getElementById('listName').value = '';
      document.getElementById('listError').textContent = '';
      showToast('List created!', 'success');
      loadLists();
    } else {
      var data = await response.json();
      document.getElementById('listError').textContent = data.message;
    }
  }

  // Show delete confirmation inside the row
  function deleteList(id) {
    var row = document.getElementById('list-' + id);
    row.innerHTML = '<div style="display:flex; justify-content:space-between; align-items:center; width:100%;">'
      + '<span style="color:#ff6b6b; font-size:14px; font-weight:600;">⚠️ Delete this list?</span>'
      + '<div style="display:flex; gap:8px;">'
      + '<button class="btn-open" onclick="confirmDelete(\'' + id + '\')">Yes</button>'
      + '<button class="btn-remove" onclick="loadLists()">Cancel</button>'
      + '</div>'
      + '</div>';
  }

  // Actually delete the list after confirmation
  async function confirmDelete(id) {
    await fetch(API + '/lists/' + id, {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + token }
    });
    showToast('List deleted', 'success');
    loadLists();
  }

  // Open a list and go to shopping page
  function openList(id, name) {
    localStorage.setItem('currentListId', id);
    localStorage.setItem('currentListName', name);
    window.location.href = 'shopping.html';
  }

  // Logout and clear saved data
  function logout() {
    localStorage.clear();
    window.location.href = 'index.html';
  }
</script>

</body>
</html>
